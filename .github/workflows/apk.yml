name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Regenerate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/PhoneMonitor.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneMonitor-APK
          path: android/app/build/outputs/apk/debug/PhoneMonitor.apk
          retention-days: 90
