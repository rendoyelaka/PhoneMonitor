name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/PhoneMonitor.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneMonitor-APK
          path: android/app/build/outputs/apk/debug/PhoneMonitor.apk
          retention-days: 90
